<!-- TEMPLATE FOR WEB-SITE USE-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neon Nuance — WebGL</title>
<!--
  Neon Nuance — optimized, web-ready build of the Shadertoy shader.
  Self-contained: no dependencies, no build step. Drop into any page.

  Usage as a full-page background:
    <canvas id="neon"></canvas>  +  this script, with CSS position:fixed.

  Tuning knobs live in the fragment shader header (#define) and in the
  CONFIG block at the bottom of this file.
-->
<style>
  html, body { margin: 0; height: 100%; background: #05030a; overflow: hidden; }
  /* position:fixed turns the canvas into a full-viewport background layer. */
  #neon { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="neon"></canvas>

<!-- ── Vertex shader: a single fullscreen triangle ─────────────── -->
<script id="vert" type="x-shader/x-vertex">
attribute vec2 a_pos;
void main() { gl_Position = vec4( a_pos, 0.0, 1.0 ); }
</script>

<!-- ── Fragment shader: the optimized Neon Nuance effect ───────── -->
<script id="frag" type="x-shader/x-fragment">
precision highp float;

uniform vec2  u_resolution;
uniform float u_time;

// Quality knobs (lower = faster, ideal for mobile / hero backgrounds).
#define BACK_DETAIL 4   // fBm octaves for the background.
#define TUBES       4   // number of glowing neon tubes.

#define TAU 6.2831853

// Iridescent neon palette (cosine gradient, IQ technique).
vec3 neonPalette( float t ) {
    return vec3( 0.55, 0.40, 0.55 )
         + vec3( 0.45, 0.45, 0.55 ) * cos( TAU * ( t + vec3( 0.0, 0.33, 0.67 ) ) );
}

// Inverse-distance glow of one horizontal neon tube.
float neonLine( vec2 uv, float wave, float thickness ) {
    return thickness / ( abs( uv.y - wave ) + 1e-4 );
}

// Animated tube shape (sum of sines), drifted by a phase offset.
float waveShape( float x, float t, float phase ) {
    return  0.18 * sin( x * 2.4 + t * 1.1 + phase )
          + 0.10 * sin( x * 5.1 - t * 0.7 + phase * 1.7 )
          + 0.05 * sin( x * 9.3 + t * 1.9 + phase * 0.3 );
}

float hash( vec2 p ) {
    p = fract( p * vec2( 123.34, 456.21 ) );
    p += dot( p, p + 45.32 );
    return fract( p.x * p.y );
}

// Smooth value noise.
float valueNoise( vec2 p ) {
    vec2 i = floor( p );
    vec2 f = fract( p );
    f = f * f * ( 3.0 - 2.0 * f );
    float a = hash( i );
    float b = hash( i + vec2( 1.0, 0.0 ) );
    float c = hash( i + vec2( 0.0, 1.0 ) );
    float d = hash( i + vec2( 1.0, 1.0 ) );
    return mix( mix( a, b, f.x ), mix( c, d, f.x ), f.y );
}

// fBm: stacked, rotated noise octaves.
float fbm( vec2 p ) {
    float sum = 0.0, amp = 0.5;
    mat2 rot = mat2( 0.8, -0.6, 0.6, 0.8 );
    for ( int i = 0; i < BACK_DETAIL; i++ ) {
        sum += amp * valueNoise( p );
        p    = rot * p * 2.0;
        amp *= 0.5;
    }
    return sum;
}

// Domain-warped fBm field, tinted with the neon palette.
vec3 detailBackground( vec2 uv, float t ) {
    vec2 p = uv * 3.0;
    vec2 q = vec2( fbm( p + vec2( 0.0, t * 0.15 ) ),
                   fbm( p + vec2( 5.2, 1.3 - t * 0.12 ) ) );
    vec2 r = vec2( fbm( p + 2.0 * q + vec2( 1.7, 9.2 ) + t * 0.10 ),
                   fbm( p + 2.0 * q + vec2( 8.3, 2.8 ) - t * 0.08 ) );
    float f = fbm( p + 2.0 * r );
    vec3  col = neonPalette( f + t * 0.04 + length( q ) * 0.3 );
    float intensity = pow( clamp( f * 1.1, 0.0, 1.0 ), 2.2 );
    return col * intensity * 0.45;
}

void main() {
    vec2 fragCoord = gl_FragCoord.xy;
    vec2 uv = ( fragCoord - 0.5 * u_resolution ) / u_resolution.y;
    float t = u_time;

    vec3 col = detailBackground( uv, t );

    for ( int i = 0; i < TUBES; i++ ) {
        float fi = float( i );
        float wave = waveShape( uv.x, t, fi * 1.7 ) + ( fi - 1.5 ) * 0.22;
        col += neonPalette( fi * 0.18 + t * 0.05 ) * neonLine( uv, wave, 0.012 );
    }

    col  = 1.0 - exp( -col * 1.4 );                       // bloom tonemap
    col *= 0.92 + 0.08 * sin( fragCoord.y * 1.5 + t * 4.0 ); // scanline shimmer
    col *= 1.0 - 0.5 * dot( uv, uv );                     // vignette

    gl_FragColor = vec4( col, 1.0 );
}
</script>

<!-- ── Runtime ─────────────────────────────────────────────────── -->
<script>
(function () {
  "use strict";

  // ── CONFIG ───────────────────────────────────────────────────
  var CONFIG = {
    maxPixelRatio: 2,   // cap DPR so 4K/retina screens stay fast.
    timeScale:     1.0, // playback speed of the animation.
    pauseOffscreen: true // stop rendering when the canvas isn't visible.
  };

  var canvas = document.getElementById("neon");
  var gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
  if (!gl) {
    canvas.replaceWith(Object.assign(document.createElement("div"), {
      textContent: "WebGL is not supported in this browser.",
      style: "color:#f0f;font:14px sans-serif;padding:1rem;"
    }));
    return;
  }

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error("Shader compile error:\n" + gl.getShaderInfoLog(s));
      gl.deleteShader(s);
      return null;
    }
    return s;
  }

  var vs = compile(gl.VERTEX_SHADER,   document.getElementById("vert").textContent);
  var fs = compile(gl.FRAGMENT_SHADER, document.getElementById("frag").textContent);
  var program = gl.createProgram();
  gl.attachShader(program, vs);
  gl.attachShader(program, fs);
  gl.linkProgram(program);
  if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
    console.error("Program link error:\n" + gl.getProgramInfoLog(program));
    return;
  }
  gl.useProgram(program);

  // Fullscreen triangle (covers the viewport with one primitive).
  var buffer = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var loc = gl.getAttribLocation(program, "a_pos");
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

  var uRes  = gl.getUniformLocation(program, "u_resolution");
  var uTime = gl.getUniformLocation(program, "u_time");

  function resize() {
    var dpr = Math.min(window.devicePixelRatio || 1, CONFIG.maxPixelRatio);
    var w = Math.floor(canvas.clientWidth  * dpr);
    var h = Math.floor(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }
  window.addEventListener("resize", resize);

  // Visibility gating: don't burn cycles when not on screen.
  var onScreen = true;
  if (CONFIG.pauseOffscreen && "IntersectionObserver" in window) {
    new IntersectionObserver(function (e) { onScreen = e[0].isIntersecting; })
      .observe(canvas);
  }

  var start = performance.now();
  function frame(now) {
    requestAnimationFrame(frame);
    if (!onScreen || document.hidden) return;
    resize();
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTime, ((now - start) * 0.001) * CONFIG.timeScale);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
